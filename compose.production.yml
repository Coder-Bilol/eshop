name: eshop

services:
  postgres:
    image: postgres:16.10-alpine
    restart: unless-stopped
    env_file:
      - /opt/eshop/secrets/postgres.env
    command:
      - postgres
      - -c
      - shared_buffers=64MB
      - -c
      - work_mem=2MB
      - -c
      - maintenance_work_mem=32MB
      - -c
      - max_connections=30
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    image: eshop-backend:production
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    restart: unless-stopped
    env_file:
      - /opt/eshop/secrets/backend.env
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "127.0.0.1:9000:9000"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:9000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\"",
        ]
      interval: 15s
      timeout: 5s
      retries: 10

  storefront:
    image: eshop-storefront:production
    build:
      context: .
      dockerfile: apps/storefront/Dockerfile
      args:
        NEXT_PUBLIC_MEDUSA_BACKEND_URL: ${NEXT_PUBLIC_MEDUSA_BACKEND_URL:-https://eshop.natureonzoom.win}
        NEXT_PUBLIC_STOREFRONT_URL: ${NEXT_PUBLIC_STOREFRONT_URL:-https://eshop.natureonzoom.win}
        NEXT_PUBLIC_MEDUSA_PUBLISHABLE_KEY: ${NEXT_PUBLIC_MEDUSA_PUBLISHABLE_KEY:-pk_build_placeholder}
        NEXT_PUBLIC_MEDUSA_SALES_CHANNEL_ID: ${NEXT_PUBLIC_MEDUSA_SALES_CHANNEL_ID:-sc_build_placeholder}
    restart: unless-stopped
    env_file:
      - /opt/eshop/secrets/storefront.env
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "127.0.0.1:3000:3000"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:3000/').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\"",
        ]
      interval: 15s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
