name: Production backend image

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - .github/workflows/production-backend-image.yml
      - apps/backend/Dockerfile

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/backend/Dockerfile
          platforms: linux/amd64
          tags: eshop-backend:production
          outputs: type=docker,dest=/tmp/eshop-backend-production.tar
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - uses: actions/upload-artifact@v4
        with:
          name: eshop-backend-production-${{ github.sha }}
          path: /tmp/eshop-backend-production.tar
          compression-level: 0
          retention-days: 1
