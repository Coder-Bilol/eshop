name: Production backend image

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - .github/workflows/production-backend-image.yml

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Validate scoped backend build
        shell: bash
        run: |
          npm ci --workspace @eshop/backend --include=dev
          if ! npm --workspace apps/backend run build > /tmp/backend-build.log 2>&1; then
            message=$(tail -n 30 /tmp/backend-build.log | tr '\n' ' ' | cut -c1-4000)
            echo "::error title=Backend build failed::$message"
            exit 1
          fi

  build:
    needs: validate
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/backend/Dockerfile
          platforms: linux/amd64
          tags: eshop-backend:production
          outputs: type=docker,dest=/tmp/eshop-backend-production.tar

      - uses: actions/upload-artifact@v4
        with:
          name: eshop-backend-production-${{ github.sha }}
          path: /tmp/eshop-backend-production.tar
          compression-level: 0
          retention-days: 1
